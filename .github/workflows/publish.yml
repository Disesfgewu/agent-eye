name: publish

# Push a version tag to build the .vsix, attach it to a downloadable GitHub
# Release, and (if the secrets are set) publish to the marketplaces:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Optional repository secrets (Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps PAT with Marketplace → Manage scope
#   OVSX_PAT  — Open VSX access token
# See PUBLISHING.md. Set `publisher` in packages/vscode-extension/package.json
# to your publisher id before publishing to a marketplace.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Package the .vsix
        working-directory: packages/vscode-extension
        run: npx --yes @vscode/vsce package --no-dependencies --allow-missing-repository

      - name: Create GitHub Release with the .vsix (downloadable)
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode-extension/*.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: packages/vscode-extension
        run: npx --yes @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: packages/vscode-extension
        run: npx --yes ovsx publish --no-dependencies -p "$OVSX_PAT"
