name: publish

# Publishes the extension to the VS Code Marketplace and Open VSX when you push
# a version tag (e.g. `git tag v0.1.0 && git push --tags`).
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps PAT with Marketplace → Manage scope
#   OVSX_PAT  — Open VSX access token
# See PUBLISHING.md for how to obtain them, and set `publisher` in
# packages/vscode-extension/package.json to your publisher id first.

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: packages/vscode-extension
        run: npx --yes @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: packages/vscode-extension
        run: npx --yes ovsx publish --no-dependencies -p "$OVSX_PAT"
